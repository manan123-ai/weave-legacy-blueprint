    <!--
      Organization/WebSite/FAQ structured data is injected per-route by the
      <SEO> component (src/components/SEO.tsx) via react-helmet-async and
      captured into the static HTML by scripts/prerender.mjs. It is
      deliberately NOT duplicated here — a hardcoded copy plus the
      Helmet-injected copy would both survive prerendering (script tags
      aren't deduped the way meta tags are), producing conflicting
      Organization/WebSite/FAQPage blocks on the same page.
    -->

  </head>

  <body>
    <!--
      Instant splash — paints before React loads so the user sees the
      brand identity immediately (no white flash). React's <Preloader />
      mounts on top with the same background, then fades out together.
    -->
    <style>
      #initial-splash {
        position: fixed; inset: 0; z-index: 99999;
        background: #EFEAE2;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column;
        transition: opacity .5s ease;
      }
      #initial-splash img { width: 180px; height: 180px; object-fit: contain; }
      #initial-splash .bar { margin-top: 32px; width: 200px; height: 1px; overflow: hidden; }
      #initial-splash .bar > span {
        display: block; height: 100%; width: 100%;
        background: #c9a84c;
        transform: scaleX(0);
        transform-origin: left;
        animation: jco-load 1.5s ease-in-out forwards;
      }
      @keyframes jco-load {
        0% { transform: scaleX(0); }
        100% { transform: scaleX(1); }
      }
      .react-mounted #initial-splash { opacity: 0; pointer-events: none; }
    </style>
    <div id="initial-splash" aria-hidden="true">
      <img src="/jco-logo.png" alt="Janki Nath & Co. — JCO Fabrics" />
      <div class="bar"><span></span></div>
    </div>

    <div id="root"></div>

    <!--
      Hidden static form for Netlify form detection.
      Netlify scans the built HTML for forms at deploy time. Because our app
      is a React SPA, the live form is rendered by JS and is invisible to the
      crawler — so we mirror its fields here. Field `name` attributes MUST
      match the React form. Do not remove.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="text" name="company" />
      <input type="text" name="fabricInterest" />
      <textarea name="message"></textarea>
    </form>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide the instant splash once React has mounted the app.
      // The React <Preloader /> handles the polished fade-out from there.
      (function () {
        var tries = 0;
        var t = setInterval(function () {
          tries++;
          var root = document.getElementById('root');
          if ((root && root.childNodes.length > 0) || tries > 40) {
            document.documentElement.classList.add('react-mounted');
            setTimeout(function () {
              var s = document.getElementById('initial-splash');
              if (s && s.parentNode) s.parentNode.removeChild(s);
            }, 600);
            clearInterval(t);
          }
        }, 100);
      })();
    </script>
  </body>
